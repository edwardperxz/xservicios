<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Reservas - Xservicios</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a962;
      --gold-light: #d4b978;
      --gold-dark: #a88b4a;
      --dark-bg: #0a0a0a;
      --dark-deep: #050505;
      --dark-card: #1a1a1a;
      --dark-lighter: #2a2a2a;
      --text-white: #ffffff;
      --text-gray: #a0a0a0;
      --green: #2d7a5f;
      --green-hover: #236349;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--dark-deep);
      color: var(--text-white);
      min-height: 100vh;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      padding: 1rem 2.5rem;
      background: linear-gradient(to bottom, rgba(10, 10, 10, 0.98), rgba(5, 5, 5, 0.95));
      border-bottom: 1px solid rgba(201, 169, 98, 0.3);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
    }

    .logo-x {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 10px rgba(201, 169, 98, 0.5);
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-white);
      letter-spacing: 0.5px;
    }

    .nav-menu {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-left: 4rem;
      margin-right: 4rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-gray);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.3s;
      white-space: nowrap;
    }

    .nav-item:hover {
      color: var(--gold);
    }

    .nav-icon {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      flex-shrink: 0;
    }

    .user-actions {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-left: auto;
    }

    .lang-selector {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-gray);
      font-size: 0.8rem;
    }

    .lang-icon {
      width: 14px;
      height: 14px;
      stroke: var(--gold);
      fill: none;
    }

    .lang-text {
      color: var(--text-gray);
      cursor: pointer;
      transition: color 0.3s;
      font-size: 0.8rem;
    }

    .lang-text:hover {
      color: var(--gold);
    }

    .lang-divider {
      color: var(--dark-lighter);
    }

    .notification-icon {
      cursor: pointer;
    }

    .notification-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--text-gray);
      fill: none;
    }

    .notification-icon:hover svg {
      stroke: var(--gold);
    }

    .auth-button {
      padding: 0.5rem 1.1rem;
      border: 1px solid var(--gold);
      border-radius: 20px;
      color: var(--gold);
      font-size: 0.8rem;
      text-decoration: none;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .auth-button:hover {
      background: rgba(201, 169, 98, 0.15);
    }

    .is-hidden {
      display: none !important;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      padding: 0.4rem 0.75rem;
      background: rgba(201, 169, 98, 0.1);
      border-radius: 25px;
      transition: background 0.3s;
    }

    .user-profile:hover {
      background: rgba(201, 169, 98, 0.2);
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--dark-bg);
    }

    .user-name {
      color: var(--text-white);
      font-size: 0.85rem;
    }

    .dropdown-icon {
      width: 14px;
      height: 14px;
      stroke: var(--text-gray);
      fill: none;
    }

    /* Sub Header */
    .sub-header {
      display: flex;
      align-items: center;
      gap: 2rem;
      padding: 1rem 2.5rem;
      background: var(--dark-card);
      border-bottom: 1px solid var(--dark-lighter);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-gray);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .back-btn:hover {
      color: var(--gold);
    }

    .back-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
    }

    .sub-nav {
      display: flex;
      gap: 2rem;
    }

    .sub-nav-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-gray);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      transition: all 0.3s;
    }

    .sub-nav-item:hover {
      color: var(--gold);
    }

    .sub-nav-item.active {
      color: var(--gold);
      background: rgba(201, 169, 98, 0.15);
    }

    .sub-nav-item svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
    }

    /* Content */
    .content {
      padding: 2rem 2.5rem;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--text-white);
      margin-bottom: 2rem;
    }

    .page-title span {
      color: var(--gold);
    }

    /* Sub-secciones tabs */
    .sub-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--dark-lighter);
      padding-bottom: 1rem;
    }

    .sub-tab {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--dark-card);
      border: 1px solid var(--dark-lighter);
      border-radius: 8px;
      color: var(--text-gray);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .sub-tab:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .sub-tab.active {
      background: rgba(201, 169, 98, 0.15);
      border-color: var(--gold);
      color: var(--gold);
    }

    .sub-tab .count {
      background: var(--dark-lighter);
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      font-size: 0.75rem;
    }

    .sub-tab.active .count {
      background: var(--gold);
      color: var(--dark-bg);
    }

    /* Reservas List */
    .reservas-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .reserva-card {
      background: var(--dark-card);
      border: 1px solid var(--dark-lighter);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s;
      cursor: pointer;
    }

    .reserva-card:hover {
      border-color: var(--gold);
      box-shadow: 0 4px 20px rgba(201, 169, 98, 0.1);
    }

    .reserva-card.expanded {
      border-color: var(--gold);
    }

    .reserva-summary {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1rem;
    }

    .reserva-imagen {
      width: 120px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid var(--gold);
    }

    .reserva-ruta {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex: 1;
    }

    .ruta-punto {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .ruta-label {
      font-size: 0.7rem;
      color: var(--text-gray);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .ruta-nombre {
      font-size: 1rem;
      color: var(--text-white);
      font-weight: 500;
    }

    .ruta-flecha {
      display: flex;
      align-items: center;
      color: var(--gold);
    }

    .ruta-flecha svg {
      width: 32px;
      height: 32px;
      stroke: var(--gold);
      fill: none;
    }

    .reserva-fecha {
      text-align: right;
      padding-right: 1rem;
    }

    .fecha-dia {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--gold);
    }

    .fecha-mes {
      font-size: 0.8rem;
      color: var(--text-gray);
    }

    .expand-icon {
      width: 24px;
      height: 24px;
      stroke: var(--text-gray);
      fill: none;
      transition: transform 0.3s;
    }

    .reserva-card.expanded .expand-icon {
      transform: rotate(180deg);
    }

    /* Detalle expandido */
    .reserva-detalle {
      border-top: 1px dashed var(--dark-lighter);
      padding: 1.5rem;
      background: linear-gradient(to bottom, var(--dark-card), rgba(5, 5, 5, 0.5));
      display: none;
    }

    .reserva-card.expanded .reserva-detalle {
      display: block;
    }

    .receipt-header {
      text-align: center;
      padding-bottom: 1rem;
      border-bottom: 1px dashed var(--dark-lighter);
      margin-bottom: 1.5rem;
    }

    .receipt-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: var(--gold);
      margin-bottom: 0.25rem;
    }

    .receipt-id {
      font-size: 0.8rem;
      color: var(--text-gray);
    }

    .receipt-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .receipt-section {
      margin-bottom: 1.5rem;
    }

    .receipt-section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gold);
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--dark-lighter);
    }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .receipt-label {
      color: var(--text-gray);
    }

    .receipt-value {
      color: var(--text-white);
      font-weight: 500;
    }

    /* Fichas en el detalle */
    .fichas-container {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .ficha-mini {
      flex: 1;
      background: linear-gradient(135deg, #1f1f1f, #151515);
      border: 2px solid var(--gold);
      border-radius: 10px;
      padding: 1rem;
      display: flex;
      gap: 1rem;
    }

    .ficha-mini-img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--gold);
    }

    .ficha-mini-img.chofer {
      border-radius: 50%;
    }

    .ficha-mini-info {
      flex: 1;
    }

    .ficha-mini-title {
      font-size: 0.85rem;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .ficha-mini-detail {
      font-size: 0.75rem;
      color: var(--text-gray);
      margin-bottom: 0.15rem;
    }

    .ficha-mini-rating {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }

    .star {
      font-size: 0.8rem;
    }

    .star.full {
      color: var(--gold);
    }

    .star.half {
      color: var(--gold);
      opacity: 0.5;
    }

    .star.empty {
      color: var(--dark-lighter);
    }

    .rating-number {
      font-size: 0.8rem;
      color: var(--gold);
      font-weight: 600;
    }

    /* Transportes */
    .transportes-list {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .transporte-tag {
      background: rgba(201, 169, 98, 0.15);
      border: 1px solid var(--gold);
      padding: 0.35rem 0.75rem;
      border-radius: 15px;
      font-size: 0.75rem;
      color: var(--gold);
    }

    /* Total */
    .receipt-total {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 2px dashed var(--gold);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-label {
      font-size: 1rem;
      color: var(--text-white);
      font-weight: 600;
    }

    .total-amount {
      font-size: 1.5rem;
      color: var(--gold);
      font-weight: 700;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-gray);
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      stroke: var(--dark-lighter);
      fill: none;
      margin-bottom: 1rem;
    }

    .empty-state p {
      font-size: 1rem;
    }

    @media (max-width: 1024px) {
      .receipt-content {
        grid-template-columns: 1fr;
      }

      .fichas-container {
        flex-direction: column;
      }
    }

    @media (max-width: 768px) {
      .header {
        flex-wrap: wrap;
        padding: 1rem;
      }

      .nav-menu {
        order: 3;
        width: 100%;
        margin: 1rem 0 0 0;
        justify-content: center;
      }

      .reserva-summary {
        flex-wrap: wrap;
      }

      .reserva-imagen {
        width: 100%;
        height: 150px;
      }

      .sub-tabs {
        flex-wrap: wrap;
      }
    }
  </style>

</head>

    let seccionActual = 'actuales';
    let reservaExpandida = null;

    function formatearFecha(fecha) {
      const [year, month, day] = fecha.split('-');
      const meses = ["", "Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
      return { dia: day, mes: meses[parseInt(month)] };
    }

    function renderEstrellas(rating) {
      let html = '';
      const enteras = Math.floor(rating);
      const decimal = rating - enteras;
      for (let i = 0; i < 5; i++) {
        if (i < enteras) {
          html += `<span class="star full">★</span>`;
        } else if (i === enteras && decimal >= 0.5) {
          html += `<span class="star half">★</span>`;
        } else {
          html += `<span class="star empty">★</span>`;
        }
      }
      return html;
    }

    function renderReservas(seccion) {
      const reservas = reservasData[seccion] || [];
      let html = '';

      if (reservas.length === 0) {
        html = `<div class="empty-state">
          <svg viewBox="0 0 24 24" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          <p>No hay reservas en esta sección</p>
        </div>`;
      } else {
        html = reservas.map(r => {
          const fechaFormato = formatearFecha(r.fecha);
          const isExpanded = reservaExpandida === r.id;
          return `
            <div class="reserva-card ${isExpanded ? 'expanded' : ''}" onclick="toggleReserva('${r.id}')">
              <div class="reserva-summary">
                <img src="${r.imagenDestino}" alt="${r.destino}" class="reserva-imagen" />
                <div class="reserva-ruta">
                  <div class="ruta-punto">
                    <span class="ruta-label">Origen</span>
                    <span class="ruta-nombre">${r.origen}</span>
                  </div>
                  <div class="ruta-flecha">
                    <svg viewBox="0 0 24 24" stroke-width="2">
                      <line x1="5" y1="12" x2="19" y2="12" />
                      <polyline points="12 5 19 12 12 19" />
                    </svg>
                  </div>
                  <div class="ruta-punto">
                    <span class="ruta-label">Destino</span>
                    <span class="ruta-nombre">${r.destino}</span>
                  </div>
                </div>
                <div class="reserva-fecha">
                  <div class="fecha-dia">${fechaFormato.dia}</div>
                  <div class="fecha-mes">${fechaFormato.mes}</div>
                </div>
                <svg class="expand-icon" viewBox="0 0 24 24" stroke-width="2">
                  <polyline points="6 9 12 15 18 9" />
                </svg>
              </div>
              ${isExpanded ? `
                <div class="reserva-detalle">
                  <div class="receipt-header">
                    <h3 class="receipt-title">Comprobante de Reserva</h3>
                    <p class="receipt-id">${r.id}</p>
                  </div>
                  <div class="receipt-content">
                    <div>
                      <div class="receipt-section">
                        <h4 class="receipt-section-title">Detalles del Viaje</h4>
                        <div class="receipt-row">
                          <span class="receipt-label">Origen:</span>
                          <span class="receipt-value">${r.origen}</span>
                        </div>
                        <div class="receipt-row">
                          <span class="receipt-label">Destino:</span>
                          <span class="receipt-value">${r.destino}</span>
                        </div>
                        <div class="receipt-row">
                          <span class="receipt-label">Hora de recogida:</span>
                          <span class="receipt-value">${r.hora}</span>
                        </div>
                        <div class="receipt-row">
                          <span class="receipt-label">Duración:</span>
                          <span class="receipt-value">${r.duracion}</span>
                        </div>
                      </div>
                      <div class="receipt-section">
                        <h4 class="receipt-section-title">Transportes Utilizados</h4>
                        <div class="transportes-list">
                          ${r.transportes.map(t => `<span class="transporte-tag">${t}</span>`).join('')}
                        </div>
                      </div>
                    </div>
                    <div>
                      <div class="receipt-section">
                        <h4 class="receipt-section-title">Unidad y Conductor</h4>
                        <div class="fichas-container">
                          <div class="ficha-mini">
                            <img src="${r.bus.imagen}" alt="${r.bus.nombre}" class="ficha-mini-img" />
                            <div class="ficha-mini-info">
                              <p class="ficha-mini-title">${r.bus.nombre}</p>
                              <p class="ficha-mini-detail">Placa: ${r.bus.placa}</p>
                              <p class="ficha-mini-detail">Capacidad: ${r.bus.capacidad} pasajeros</p>
                              <p class="ficha-mini-detail">Color: ${r.bus.color}</p>
                            </div>
                          </div>
                        </div>
                        <div class="fichas-container" style="margin-top: 1rem;">
                          <div class="ficha-mini">
                            <img src="${r.chofer.imagen}" alt="${r.chofer.nombre}" class="ficha-mini-img chofer" />
                            <div class="ficha-mini-info">
                              <p class="ficha-mini-title">${r.chofer.nombre}</p>
                              <p class="ficha-mini-detail">Experiencia: ${r.chofer.experiencia}</p>
                              <p class="ficha-mini-detail">Viajes: ${r.chofer.viajes}</p>
                              <div class="ficha-mini-rating">
                                ${renderEstrellas(r.chofer.rating)}
                                <span class="rating-number">${r.chofer.rating}</span>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div class="receipt-total">
                    <span class="total-label">Monto Total</span>
                    <span class="total-amount">$${r.monto}.00</span>
                  </div>
                </div>
              ` : ''}
            </div>
          `;
        }).join('');
      }

      document.getElementById('reservas-list').innerHTML = html;
    }

    function toggleReserva(id) {
      reservaExpandida = reservaExpandida === id ? null : id;
      renderReservas(seccionActual);
    }

    document.querySelectorAll('.sub-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        seccionActual = this.dataset.section;
        reservaExpandida = null;
        renderReservas(seccionActual);
      });
    });

    renderReservas('actuales');
  </script>
